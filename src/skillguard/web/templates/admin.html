<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>SkillGuard — Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --abyss: #050507; --carbon: #101010; --charcoal: #3d3a39;
            --charcoal-light: #5a5554; --emerald: #00d992; --emerald-mint: #2fd6a1;
            --emerald-glow: rgba(0,217,146,0.15); --emerald-border: rgba(0,217,146,0.3);
            --snow: #f2f2f2; --parchment: #b8b3b0; --steel: #8b949e;
            --red: #fb565b; --red-bg: rgba(251,86,91,0.1); --red-border: rgba(251,86,91,0.3);
            --amber: #ffba00; --amber-bg: rgba(255,186,0,0.1); --amber-border: rgba(255,186,0,0.3);
            --blue: #4cb3d4; --blue-bg: rgba(76,179,212,0.1); --blue-border: rgba(76,179,212,0.3);
            --font-body: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--abyss); color: var(--snow); min-height: 100vh; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--charcoal);
        }
        .logo { font-family: var(--font-mono); font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--emerald); display: flex; align-items: center; gap: 8px; }
        .logo svg { width: 22px; height: 22px; }
        .logo svg .st0 { fill: var(--emerald); }
        .logo span { color: var(--steel); }
        .logout { font-family: var(--font-mono); font-size: 12px; color: var(--steel); text-decoration: none; }
        .logout:hover { color: var(--snow); }

        .section-label {
            font-family: var(--font-mono); font-size: 12px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase; color: var(--steel);
            margin: 28px 0 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .stat-box {
            background: var(--carbon); border: 1px solid var(--charcoal);
            border-radius: 6px; padding: 18px 14px; text-align: center;
        }
        .stat-box .value { font-family: var(--font-mono); font-size: 28px; font-weight: 600; }
        .stat-box .label { font-size: 11px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; color: var(--steel); margin-top: 4px; }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .filter-select {
            background: var(--carbon);
            border: 1px solid var(--charcoal);
            border-radius: 6px;
            color: var(--snow);
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 8px 12px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .filter-select:focus { border-color: var(--emerald); }
        .filter-select option { background: var(--carbon); color: var(--snow); }
        .filter-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* SCANS TABLE */
        .scans-scroll {
            max-height: 480px;
            overflow-y: auto;
            border: 1px solid var(--charcoal);
            border-radius: 8px;
            background: var(--carbon);
        }
        .scans-scroll::-webkit-scrollbar { width: 5px; }
        .scans-scroll::-webkit-scrollbar-track { background: var(--carbon); }
        .scans-scroll::-webkit-scrollbar-thumb { background: var(--charcoal); border-radius: 3px; }

        .scans-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .scans-table th {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--steel);
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid var(--charcoal);
            position: sticky;
            top: 0;
            background: var(--carbon);
            z-index: 1;
        }
        .scans-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(61,58,57,0.4);
            color: var(--parchment);
            font-family: var(--font-mono);
            font-size: 12px;
        }
        .scans-table tr:hover td { background: rgba(255,255,255,0.02); }

        .badge {
            display: inline-block; padding: 2px 7px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 10px; font-weight: 600;
            letter-spacing: 0.3px; text-transform: uppercase;
        }
        .badge-file { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
        .badge-prompt { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
        .badge-url { background: var(--emerald-glow); color: var(--emerald); border: 1px solid var(--emerald-border); }
        .badge-low { background: var(--emerald-glow); color: var(--emerald); border: 1px solid var(--emerald-border); }
        .badge-medium { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
        .badge-high { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
        .badge-critical { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

        .target { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--snow); }
        .ip { color: var(--emerald-mint); }
        .empty { text-align: center; padding: 48px; color: var(--steel); font-size: 13px; }
        .no-results { text-align: center; padding: 32px; color: var(--steel); font-size: 13px; font-family: var(--font-mono); }

        footer {
            text-align: center;
            padding: 20px 0;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--steel);
            border-top: 1px solid var(--charcoal);
            margin-top: 32px;
        }
        footer a { color: var(--emerald); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg"><path class="st0" d="M688.65,787.13H111.35c-54.39,0-98.48-44.09-98.48-98.48V111.35c0-54.39,44.09-98.48,98.48-98.48h577.29 c54.39,0,98.48,44.09,98.48,98.48v577.29C787.13,743.04,743.04,787.13,688.65,787.13z"/><path d="M666.25,351.89c0-77.87-0.19-148.09,0.16-218.3c0.07-14.47-6.86-17.12-19.63-17.08c-117.73,0.38-235.48-1.29-353.17,0.76 c-127.92,5.28-169.97,111.9-160.44,226.04c-0.94,15.71,4.55,25.68,17.35,34.97c67.53,48.98,134.45,98.83,201.51,148.46 c48.55,35.93,48.5,35.99,96.41-0.44c48.85-37.14,48.71-36.94-2.02-72.85c-10.85-7.68-20.53-13.6-31.8-1.76 c-10.83,11.38-20.22,8.1-31.65-0.56c-51.79-39.23-104.2-77.64-156.39-116.34c-6.32-4.68-12.87-8.69-14.04-17.88 c-10.52-82.14,36.55-122.22,95.81-120.24c71.08,2.38,142.31,0.57,213.47,0.57c65.75,0,65.52,0,66.07,66.24 c0.1,11.75-5.16,25.68,6.38,34.74C616.09,315.36,638.72,331.47,666.25,351.89z M133.58,448.08c0,77.21,0.32,147.39-0.24,217.57 c-0.13,16.51,8.45,18.08,21.56,18.05c116.81-0.33,233.64,0.76,350.44-0.7c127.62-4.29,171.73-112.3,161.32-225.18 c0.92-16.6-4.73-27.05-18.57-37.02c-66.25-47.72-131.68-96.59-197.19-145.34c-51.13-38.05-50.99-38.24-102.8,0.77 c-44.42,33.45-44.09,33.02,0.79,67.38c14.04,10.75,26.03,17.52,40.41,1.83c9.16-10,17.2-3.64,25.17,2.28 c52.86,39.25,105.74,78.46,158.59,117.71c6.27,4.65,13.1,8.49,14.27,17.71c9.99,78.97-33.1,122.31-95.51,120.31 c-69.32-2.22-138.76-0.5-208.14-0.51c-71.01,0-70.86-0.01-71.66-71.11c-0.12-10.86,3.77-23.05-7.88-31.51 C182.34,484.46,160.78,468.24,133.58,448.08z"/></svg> SKILLGUARD <span>ADMIN</span></div>
            <a class="logout" href="/admin/logout">LOGOUT</a>
        </header>

        <div class="section-label">OVERVIEW</div>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-box"><div class="value" style="color:var(--emerald)" id="totalScans">—</div><div class="label">Total Scans</div></div>
            <div class="stat-box"><div class="value" style="color:var(--amber)" id="avgRisk">—</div><div class="label">Avg Risk</div></div>
            <div class="stat-box"><div class="value" style="color:var(--blue)" id="fileScans">—</div><div class="label">File Scans</div></div>
            <div class="stat-box"><div class="value" style="color:var(--amber)" id="promptScans">—</div><div class="label">Prompt Scans</div></div>
            <div class="stat-box"><div class="value" style="color:var(--emerald)" id="urlScans">—</div><div class="label">URL Scans</div></div>
        </div>

        <div class="section-label">RECENT SCANS</div>
        <div class="filters">
            <span class="filter-label">DATE:</span>
            <select class="filter-select" id="filterDate" onchange="applyFilters()">
                <option value="all">All Time</option>
                <option value="today">Today</option>
                <option value="yesterday">Yesterday</option>
                <option value="7d">Last 7 Days</option>
                <option value="30d">Last 30 Days</option>
            </select>
            <span class="filter-label">TYPE:</span>
            <select class="filter-select" id="filterType" onchange="applyFilters()">
                <option value="all">All Types</option>
                <option value="file">File</option>
                <option value="prompt">Prompt</option>
                <option value="url">URL</option>
            </select>
            <span id="filterCount" style="font-family:var(--font-mono);font-size:11px;color:var(--steel);margin-left:auto"></span>
        </div>
        <div class="scans-scroll">
            <div id="scansBody">
                <div class="empty">Loading...</div>
            </div>
        </div>

        <footer>SkillGuard v0.1.0 — <a href="#">PHRIXUS</a> — Admin Panel</footer>
    </div>

    <script>
        let allScans = [];

        async function loadData() {
            try {
                const [statsResp, scansResp] = await Promise.all([
                    fetch('/api/stats'),
                    fetch('/api/scans?limit=200')
                ]);
                if (statsResp.status === 401) { window.location.href = '/admin'; return; }

                const stats = await statsResp.json();
                allScans = await scansResp.json();

                document.getElementById('totalScans').textContent = stats.total_scans || 0;
                document.getElementById('avgRisk').textContent = stats.avg_risk_score || 0;
                document.getElementById('fileScans').textContent = stats.by_type?.file || 0;
                document.getElementById('promptScans').textContent = stats.by_type?.prompt || 0;
                document.getElementById('urlScans').textContent = stats.by_type?.url || 0;

                applyFilters();
            } catch (e) {
                document.getElementById('scansBody').innerHTML = '<div class="empty">Failed to load data</div>';
            }
        }

        function applyFilters() {
            const dateFilter = document.getElementById('filterDate').value;
            const typeFilter = document.getElementById('filterType').value;

            let filtered = allScans;

            // Date filter
            if (dateFilter !== 'all') {
                const now = new Date();
                let since;
                if (dateFilter === 'today') {
                    since = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                } else if (dateFilter === 'yesterday') {
                    since = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
                    const endOfYesterday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    filtered = filtered.filter(s => {
                        const d = new Date(s.timestamp);
                        return d >= since && d < endOfYesterday;
                    });
                    renderTable(filtered);
                    return;
                } else if (dateFilter === '7d') {
                    since = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                } else if (dateFilter === '30d') {
                    since = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                }
                if (dateFilter !== 'yesterday') {
                    filtered = filtered.filter(s => new Date(s.timestamp) >= since);
                }
            }

            // Type filter
            if (typeFilter !== 'all') {
                filtered = filtered.filter(s => s.scan_type === typeFilter);
            }

            renderTable(filtered);
        }

        function renderTable(scans) {
            const countEl = document.getElementById('filterCount');
            countEl.textContent = scans.length + ' result' + (scans.length !== 1 ? 's' : '');

            if (!scans.length) {
                document.getElementById('scansBody').innerHTML = '<div class="no-results">No scans match the selected filters</div>';
                return;
            }

            let html = `<table class="scans-table">
                <thead><tr>
                    <th>Time</th><th>Type</th><th>Target</th><th>IP</th>
                    <th>Risk</th><th>Critical</th><th>High</th><th>Warning</th>
                </tr></thead><tbody>`;

            scans.forEach(s => {
                const time = new Date(s.timestamp).toLocaleString('en-GB', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
                const typeBadge = 'badge-' + s.scan_type;
                const riskBadge = 'badge-' + (s.risk_level || 'low').toLowerCase();
                html += `<tr>
                    <td>${time}</td>
                    <td><span class="badge ${typeBadge}">${s.scan_type}</span></td>
                    <td class="target" title="${esc(s.target)}">${esc(s.target)}</td>
                    <td class="ip">${esc(s.ip_address || '—')}</td>
                    <td><span class="badge ${riskBadge}">${s.risk_score}</span></td>
                    <td>${s.critical_count || 0}</td>
                    <td>${s.high_count || 0}</td>
                    <td>${s.warning_count || 0}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            document.getElementById('scansBody').innerHTML = html;
        }

        function esc(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
